<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🎂 祝吕琪生日快乐！</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            font-family: "Microsoft YaHei", sans-serif;
        }
        .card {
            background: #fff;
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        img {
            max-width: 250px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        h1 {
            color: #ff6b81;
            font-size: 28px;
            line-height: 1.3;
        }
        p {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
        }
        .sign {
            color: #ff9a9e;
            margin-top: 20px;
        }
        .music-tip {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #ff4d6d;
        }
        .heart {
            position: fixed;
            width: 15px;
            height: 15px;
            background: #ff6b81;
            transform: rotate(45deg);
            animation: float 6s linear infinite;
            opacity: 0.7;
        }
        .heart::before, .heart::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ff6b81;
            border-radius: 50%;
        }
        .heart::before { top: -7.5px; left: 0; }
        .heart::after { left: 7.5px; top: 0; }
        @keyframes float {
            0% { transform: rotate(45deg) translateY(0); opacity: 0.7; }
            100% { transform: rotate(45deg) translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="photo.jpg" alt="合照">
        <h1>🎂 祝吕琪生日快乐！🎂</h1>
        <p>愿你永远被温柔以待，每天都能开心度过，生活顺顺利利，我会一直陪着你呀🥳</p>
        <p class="sign">—— 烨廷 留</p>
    </div>
    <div class="music-tip">点一下页面有音乐听哦</div>
    <audio id="bgMusic" loop>
        <source src="birthday.mp3" type="audio/mpeg">
    
    <script>
        let musicPlayed = false;
        document.addEventListener('click', () => {
            if (!musicPlayed) {
                document.getElementById('bgMusic').play();
                musicPlayed = true;
            }
        });
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.bottom = '-50px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
